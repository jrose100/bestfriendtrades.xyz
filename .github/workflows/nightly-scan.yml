name: Nightly Stage 2 Scan

on:
  schedule:
    # 6:30 AM CT = 11:30 UTC (CST) / 12:30 UTC (CDT)
    - cron: '30 11 * * 1-5'
  workflow_dispatch:   # ← this is the "Run workflow" button in GitHub Actions

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run scan
        env:
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        run: python scan.py

      - name: Commit results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results.json
          git diff --staged --quiet || git commit -m "scan: $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push


