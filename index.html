<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Friend Trades — Stage 2 Scanner</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700&family=Space+Grotesk:wght@500;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* Design inspired by original index (3).html */
:root {
  --bg: #0d1117; --bg2: #161b27; --border: #2a3347; --border2: #38455e;
  --text: #f0f4ff; --text-2: #9daec8; --text-3: #5d718f; --yellow: #f5c842;
  --blue-bright: #5b9cf6; --blue-dim: rgba(91,156,246,0.12);
  --teal: #2dd4bf; --teal-dim: rgba(45,212,191,0.1);
  --sky: #7dd3fc; --sky-dim: rgba(125,211,252,0.1);
  --purple: #a78bfa; --purple-dim: rgba(167,139,250,0.1);
  --up: #5b9cf6; --down: #a78bfa;
}

body { background: var(--bg); color: var(--text); font-family: "Nunito Sans", sans-serif; margin: 0; line-height: 1.6; }
header { padding: 24px var(--gap-xl); display: flex; align-items: center; border-bottom: 1px solid var(--border); background: rgba(13,17,23,0.96); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(16px); }
.logo { font-family: "Space Grotesk", sans-serif; font-size: 20px; font-weight: 700; }
.logo-highlight { color: var(--yellow); }
main { max-width: 880px; margin: 0 auto; padding: 64px 20px 100px; }
.hero-eyebrow { font-family: "IBM Plex Mono", monospace; font-size: 14px; color: var(--yellow); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
.hero-title { font-family: "Space Grotesk", sans-serif; font-size: clamp(32px, 5vw, 52px); font-weight: 700; margin-bottom: 16px; line-height: 1.1; }
.hero-title em { color: var(--yellow); font-style: normal; }
.input-card { background: var(--bg2); border: 1px solid var(--border2); padding: 24px 40px; border-radius: 8px; margin-bottom: 64px; }
.ticker-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 4px; color: var(--text); font-family: "IBM Plex Mono", monospace; padding: 15px; min-height: 80px; margin-bottom: 15px; outline: none; }
.scan-btn { background: var(--yellow); color: #0d1117; border: none; font-family: "Space Grotesk", sans-serif; font-weight: 700; padding: 13px 40px; border-radius: 4px; cursor: pointer; }
.scan-btn:disabled { opacity: 0.4; }
.feed { display: flex; flex-direction: column; gap: 10px; }
.stock-card { background: var(--bg2); border: 1px solid var(--border); padding: 20px 40px; border-radius: 8px; display: grid; grid-template-columns: 120px 1fr auto; gap: 24px; align-items: start; }
.ticker { font-family: "Space Grotesk", sans-serif; font-size: 26px; font-weight: 700; line-height: 1; }
.dir-badge { font-family: "IBM Plex Mono", monospace; font-size: 14px; padding: 3px 8px; border-radius: 4px; background: var(--blue-dim); color: var(--blue-bright); width: fit-content; margin-top: 4px; }
.zone-badge { font-family: "IBM Plex Mono", monospace; font-size: 14px; padding: 4px 12px; border-radius: 4px; width: fit-content; }
.z-prime { background: var(--blue-dim); color: var(--blue-bright); }
.z-good { background: var(--teal-dim); color: var(--teal); }
.z-extended { background: var(--sky-dim); color: var(--sky); }
.z-over { background: var(--purple-dim); color: var(--purple); }
.price { font-family: "Space Grotesk", sans-serif; font-size: 22px; font-weight: 700; text-align: right; }
.pct { font-family: "IBM Plex Mono", monospace; font-size: 15px; text-align: right; }
.pct-up { color: var(--up); } .pct-down { color: var(--down); }
.empty-state { text-align: center; color: var(--text-3); padding: 64px 0; font-family: "Space Grotesk"; font-size: 24px; }
.debug-log { font-family: "IBM Plex Mono", monospace; font-size: 12px; color: var(--text-3); margin-top: 15px; background: #000; padding: 10px; border-radius: 4px; height: 80px; overflow-y: auto; border: 1px solid var(--border); }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-highlight">best</span>·friend trades</div>
  <div style="margin-left: auto; font-family: 'IBM Plex Mono'; font-size: 14px;" id="statusText">Status: Ready</div>
</header>

<main>
  <div class="hero">
    <div class="hero-eyebrow">Stage 2 Scanner</div>
    <h1 class="hero-title">Morning <em>watchlist.</em><br>No noise.</h1>
    <p style="color: var(--text-2)">Systems scanning for stocks above rising 50 & 150-day moving averages.</p>
  </div>

  <section class="input-card">
    <textarea class="ticker-input" id="tickerInput" placeholder="Enter tickers (e.g. NVDA, COST, LLY)"></textarea>
    <div style="display: flex; align-items: center; gap: 20px;">
      <button class="scan-btn" id="scanBtn" onclick="runScan()">Run Scan</button>
      <span id="progressText" style="font-family: 'IBM Plex Mono'; font-size: 14px; color: var(--text-2)"></span>
    </div>
    <div class="debug-log" id="debugLog">System initializing...</div>
  </section>

  <section>
    <div style="display: flex; justify-content: space-between; border-bottom: 2px solid var(--border2); padding-bottom: 16px; margin-bottom: 24px;">
      <h2 style="font-family: 'Space Grotesk'; font-size: 22px;">Watchlist</h2>
      <span id="resultCount" style="color: var(--text-3); font-family: 'IBM Plex Mono'; font-size: 14px;"></span>
    </div>
    <div class="feed" id="feed">
      <div class="empty-state">Paste tickers above to begin scan.</div>
    </div>
  </section>
</main>

<script>
const API_KEY = "O5Q8NtVn14pKJH9k7rTAh6zNMU1AIGyR";

function log(msg) {
  const logger = document.getElementById("debugLog");
  logger.innerHTML += `<div>> ${msg}</div>`;
  logger.scrollTop = logger.scrollHeight;
}

async function runScan() {
  const input = document.getElementById("tickerInput").value;
  const tickers = input.split(/[,\s\n]+/).map(t => t.trim().toUpperCase()).filter(Boolean);
  
  if (tickers.length === 0) return alert("Please enter tickers.");

  const btn = document.getElementById("scanBtn");
  const progress = document.getElementById("progressText");
  const feed = document.getElementById("feed");
  
  btn.disabled = true;
  document.getElementById("debugLog").innerHTML = "";
  feed.innerHTML = '<div class="empty-state">Fetching market data...</div>';
  
  let results = [];

  for (let i = 0; i < tickers.length; i++) {
    const ticker = tickers[i];
    progress.textContent = `Analyzing ${ticker} (${i+1}/${tickers.length})`;
    log(`Fetching ${ticker}...`);

    try {
      // Historical price for SMA calculation
      const resp = await fetch(`https://financialmodelingprep.com/api/v3/historical-price-full/${ticker}?timeseries=250&apikey=${API_KEY}`);
      const data = await resp.json();

      if (!data.historical || data.historical.length < 150) {
        log(`${ticker}: Not enough data.`);
        continue;
      }

      const history = data.historical;
      const price = history[0].close;
      const prevClose = history[1].close;
      const changePct = ((price - prevClose) / prevClose) * 100;

      const ma50 = history.slice(0, 50).reduce((s, d) => s + d.close, 0) / 50;
      const ma150 = history.slice(0, 150).reduce((s, d) => s + d.close, 0) / 150;

      // STAGE 2 CRITERIA
      if (price > ma50 && ma50 > ma150) {
        log(`${ticker}: STAGE 2 CONFIRMED.`);
        const gap = ((price - ma50) / ma50) * 1
