<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Friend Trades</title>
<link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@300;400;600&family=Source+Serif+4:wght@400;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:"Source Sans 3",sans-serif;font-size:17px;color:#222;background:#fff;line-height:1.6;}
.site-wrap{max-width:900px;margin:0 auto;padding:0 24px;}
.site-header{padding:32px 0 0;border-bottom:1px solid #e0e0e0;margin-bottom:40px;}
.header-top{display:flex;align-items:center;gap:20px;margin-bottom:24px;}
.avatar{width:68px;height:68px;border-radius:50%;object-fit:cover;object-position:center top;flex-shrink:0;border:2px solid #e0e0e0;}
.site-title{font-family:"Source Serif 4",serif;font-size:30px;font-weight:600;color:#111;letter-spacing:-0.01em;}
nav{display:flex;margin-top:8px;}
nav a{padding:12px 32px 12px 0;margin-right:4px;font-size:19px;color:#555;text-decoration:none;border-bottom:3px solid transparent;transition:color 0.15s;cursor:pointer;letter-spacing:0.01em;}
nav a:hover{color:#111;}
nav a.active{color:#111;font-weight:600;border-bottom:3px solid #111;}
.page{display:none;}
.page.active{display:block;}
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:16px;margin-top:8px;}
thead{background:#f5f5f5;}
thead th{padding:10px 14px;text-align:left;font-weight:600;font-size:13px;text-transform:uppercase;letter-spacing:0.06em;color:#444;border:1px solid #ddd;white-space:nowrap;cursor:pointer;user-select:none;}
thead th:hover{background:#eee;}
thead th.r{text-align:right;}
tbody td{padding:9px 14px;border:1px solid #e0e0e0;font-size:16px;vertical-align:middle;}
tbody td.r{text-align:right;font-variant-numeric:tabular-nums;}
tbody tr:nth-child(even){background:#fafafa;}
tbody tr:hover{background:#f0f4ff;}
tbody tr.warn{background:#fff5f5;}
tbody tr.warn:hover{background:#ffe8e8;}
.sym{font-weight:600;font-size:17px;color:#111;}
.wi{color:#c0392b;font-size:13px;margin-left:4px;}
.pos{color:#1a7a3f;font-weight:600;}
.neg{color:#c0392b;font-weight:600;}
.zero{color:#888;}
td[contenteditable="true"]{cursor:text;}
td[contenteditable="true"]:focus{outline:2px solid #4a90d9;background:#eef4ff;}
.badge{font-size:12px;font-weight:600;padding:2px 8px;border-radius:3px;border:none;cursor:pointer;-webkit-appearance:none;appearance:none;font-family:inherit;}
.badge.active{background:#e6f4ec;color:#1a7a3f;}
.badge.sold-today{background:#fff8e1;color:#a06000;}
.badge.watching{background:#e8f0fe;color:#1a56c4;}
.badge.closed{background:#f0f0f0;color:#666;}
.del-btn{background:none;border:none;color:#ccc;font-size:16px;cursor:pointer;padding:0 2px;line-height:1;}
.del-btn:hover{color:#c0392b;}
.add-btn{margin-top:12px;background:#f5f5f5;border:1px solid #ddd;color:#555;padding:8px 18px;border-radius:4px;font-size:14px;font-family:inherit;cursor:pointer;}
.add-btn:hover{background:#eee;color:#111;}
.sync-bar{display:flex;align-items:center;gap:16px;margin-bottom:14px;font-size:13px;color:#888;}
.last-updated{font-size:13px;color:#888;}
.last-updated .ts{color:#1a7a3f;font-weight:600;}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#ccc;display:inline-block;margin-right:4px;}
.sync-dot.live{background:#1a7a3f;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}
.compose{margin-bottom:40px;border:1px solid #ddd;border-radius:6px;overflow:hidden;}
.compose-head{background:#f5f5f5;padding:10px 16px;font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;color:#555;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center;}
.compose-head span{font-size:13px;color:#888;font-weight:400;text-transform:none;letter-spacing:0;}
.compose textarea{width:100%;min-height:130px;border:none;padding:16px;font-family:"Source Sans 3",sans-serif;font-size:17px;line-height:1.7;color:#222;resize:vertical;outline:none;}
.compose-foot{padding:10px 16px;border-top:1px solid #ddd;background:#fafafa;display:flex;justify-content:flex-end;}
.post-btn{background:#111;color:#fff;border:none;padding:8px 22px;border-radius:4px;font-size:15px;font-family:inherit;font-weight:600;cursor:pointer;}
.post-btn:hover{background:#333;}
.post-btn:disabled{background:#999;cursor:not-allowed;}
.posts-label{font-size:13px;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:#999;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid #eee;}
.post{margin-bottom:36px;padding-bottom:36px;border-bottom:1px solid #eee;}
.post:last-child{border-bottom:none;}
.post-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.post-date{font-size:14px;color:#888;}
.post-del{background:none;border:none;font-size:13px;color:#ccc;cursor:pointer;font-family:inherit;}
.post-del:hover{color:#c0392b;}
.post-body{font-size:17px;line-height:1.75;color:#222;white-space:pre-wrap;word-wrap:break-word;}
.page-title{font-family:"Source Serif 4",serif;font-size:22px;font-weight:600;color:#111;margin-bottom:24px;padding-bottom:10px;border-bottom:1px solid #e0e0e0;}
.status{font-size:13px;color:#888;margin-bottom:12px;min-height:18px;}
.status.ok{color:#1a7a3f;}
.status.err{color:#c0392b;}
.toast{position:fixed;bottom:20px;right:20px;background:#1a7a3f;color:#fff;padding:8px 18px;border-radius:4px;font-size:14px;font-weight:600;opacity:0;transition:opacity 0.2s;pointer-events:none;}
.toast.show{opacity:1;}
footer{margin-top:60px;padding:20px 0;border-top:1px solid #e0e0e0;font-size:14px;color:#888;}
</style>
</head>

  {symbol:'CRWD',posSize:5,costBasis:345.36,stopPx:0,lastPx:349.10,sector:'Tech',status:'Active',notes:''},
  {symbol:'FSLY',posSize:100,costBasis:16.99,stopPx:0,lastPx:17.05,sector:'Tech',status:'Active',notes:''},
  {symbol:'LSCC',posSize:10,costBasis:97.15,stopPx:0,lastPx:97.60,sector:'Semi',status:'Active',notes:''},
  {symbol:'ONDS',posSize:50,costBasis:10.15,stopPx:0,lastPx:10.15,sector:'Tech',status:'Active',notes:''}
];

var pos = [];
var notePosts = [];
var watchPosts = [];
var saveTimer = null;

function todayStr() {
  return new Date().toLocaleDateString('en-US', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
}

function formatTimestamp(iso) {
  if (!iso) return null;
  var d = new Date(iso);
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric', year:'numeric'}) +
    ' at ' + d.toLocaleTimeString('en-US', {hour:'numeric', minute:'2-digit', hour12:true});
}

function setLastUpdated(iso) {
  var el = document.getElementById('last-updated');
  var dot = document.getElementById('sync-dot');
  if (!iso) {
    el.innerHTML = '<span class="sync-dot" id="sync-dot"></span> No sync data yet';
    return;
  }
  var ts = formatTimestamp(iso);
  dot.classList.add('live');
  el.innerHTML = '<span class="sync-dot live" id="sync-dot"></span> Last synced from Google Sheets: <span class="ts">' + ts + '</span>';
}

function showToast() {
  var t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(function() { t.classList.remove('show'); }, 1400);
}

function showPage(name) {
  document.querySelectorAll('.page').forEach(function(p) { p.classList.remove('active'); });
  document.querySelectorAll('nav a').forEach(function(a) { a.classList.remove('active'); });
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nav-' + name).classList.add('active');
}

async function cloudGet(key) {
  try {
    var r = await fetch(WORKER + '/' + key);
    return await r.json();
  } catch(e) { return null; }
}

async function cloudSet(key, value) {
  try {
    await fetch(WORKER + '/' + key, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(value)
    });
    return true;
  } catch(e) { return false; }
}

function escHtml(t) {
  return String(t).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function render() {
  var tb = document.getElementById('tbody');
  tb.innerHTML = '';
  for (var i = 0; i < pos.length; i++) {
    (function(i) {
      var p = pos[i];
      var pnlD = (p.lastPx - p.costBasis) * p.posSize;
      var pnlP = p.costBasis > 0 ? (p.lastPx - p.costBasis) / p.costBasis * 100 : 0;
      var warn = p.stopPx > 0 && p.lastPx < p.stopPx;
      var pC = pnlD > 0 ? 'pos' : pnlD < 0 ? 'neg' : 'zero';
      var sc = (p.status || 'Active').toLowerCase().replace(' ', '-');
      var tr = document.createElement('tr');
      if (warn) tr.classList.add('warn');



      function makeEdit(val, field, isNum, extraClass) {
        var td = document.createElement('td');
        if (extraClass) td.className = extraClass;
        td.contentEditable = 'true';
        td.textContent = val;
        td.onblur = function() {
          var v = this.textContent.trim();
          pos[i][field] = isNum ? (parseFloat(v) || 0) : (field === 'symbol' ? v.toUpperCase() : v);
          clearTimeout(saveTimer);
          saveTimer = setTimeout(savePositions, 800);
          if (field === 'symbol') this.textContent = pos[i].symbol;
        };
        return td;
      }

      var symTd = makeEdit(p.symbol, 'symbol', false, 'sym');
      if (warn) { var wi = document.createElement('span'); wi.className = 'wi'; wi.textContent = '!'; symTd.appendChild(wi); }
      tr.appendChild(symTd);
      tr.appendChild(makeEdit(p.posSize, 'posSize', true, 'r'));
      tr.appendChild(makeEdit(p.costBasis.toFixed(2), 'costBasis', true, 'r'));
      tr.appendChild(makeEdit(p.stopPx > 0 ? p.stopPx.toFixed(2) : '—', 'stopPx', true, 'r' + (warn ? ' neg' : '')));
      tr.appendChild(makeEdit(p.lastPx.toFixed(2), 'lastPx', true, 'r'));

      var pnlDTd = document.createElement('td');
      pnlDTd.className = 'r ' + pC;
      pnlDTd.textContent = (pnlD >= 0 ? '+' : '') + '$' + pnlD.toFixed(2);
      tr.appendChild(pnlDTd);

      var pnlPTd = document.createElement('td');
      pnlPTd.className = 'r ' + pC;
      pnlPTd.textContent = (pnlP >= 0 ? '+' : '') + pnlP.toFixed(2) + '%';
      tr.appendChild(pnlPTd);

      tr.appendChild(makeEdit(p.sector, 'sector', false, ''));

      var stTd = document.createElement('td');
      var sel = document.createElement('select');
      sel.className = 'badge ' + sc;
      ['Active','Sold Today','Watching','Closed'].forEach(function(opt) {
        var o = document.createElement('option');
        o.textContent = opt;
        if (p.status === opt) o.selected = true;
        sel.appendChild(o);
      });
      sel.onchange = function() {
        pos[i].status = this.value;
        this.className = 'badge ' + this.value.toLowerCase().replace(' ', '-');
        clearTimeout(saveTimer);
        saveTimer = setTimeout(savePositions, 800);
      };
      stTd.appendChild(sel);
      tr.appendChild(stTd);

      var notesTd = makeEdit(p.notes, 'notes', false, '');
      notesTd.style.color = '#666';
      notesTd.style.minWidth = '140px';
      tr.appendChild(notesTd);

      tb.appendChild(tr);
    })(i);
  }
}

function addRow() {
  pos.push({symbol:'NEW',posSize:0,costBasis:0,stopPx:0,lastPx:0,sector:'',status:'Active',notes:''});
  render();
  savePositions();
}

function delRow(i) {
  if (confirm('Remove ' + pos[i].symbol + '?')) {
    pos.splice(i, 1);
    render();
    savePositions();
  }
}

function sortBy(f) {
  pos.sort(function(a, b) {
    var av = f==='pnlD'?(a.lastPx-a.costBasis)*a.posSize:f==='pnlP'?(a.lastPx-a.costBasis)/a.costBasis:a[f];
    var bv = f==='pnlD'?(b.lastPx-b.costBasis)*b.posSize:f==='pnlP'?(b.lastPx-b.costBasis)/b.costBasis:b[f];
    return typeof av === 'number' ? bv - av : String(av).localeCompare(String(bv));
  });
  render();
}

async function savePositions() {
  var ok = await cloudSet('positions', pos);
  if (ok) {
    var now = new Date().toISOString();
    await cloudSet('last_updated', now);
    setLastUpdated(now);
    showToast();
  }
}

async function submitPost(type) {
  var inputId = type === 'notes' ? 'notes-input' : 'watch-input';
  var btnId = type === 'notes' ? 'notes-btn' : 'watch-btn';
  var statusId = type === 'notes' ? 'notes-status' : 'watch-status';
  var text = document.getElementById(inputId).value.trim();
  if (!text) return;
  var btn = document.getElementById(btnId);
  btn.disabled = true; btn.textContent = 'Saving...';
  var posts = type === 'notes' ? notePosts : watchPosts;
  posts.unshift({id: Date.now(), date: todayStr(), body: text});
  var key = type === 'notes' ? 'notes_posts' : 'watch_posts';
  var ok = await cloudSet(key, posts);
  btn.disabled = false; btn.textContent = 'Post';
  if (ok) {
    document.getElementById(inputId).value = '';
    renderPosts(type, posts);
    showToast();
  }
}

async function deletePost(type, id) {
  if (!confirm('Delete this entry?')) return;
  if (type === 'notes') notePosts = notePosts.filter(function(p) { return p.id !== id; });
  else watchPosts = watchPosts.filter(function(p) { return p.id !== id; });
  var posts = type === 'notes' ? notePosts : watchPosts;
  await cloudSet(type === 'notes' ? 'notes_posts' : 'watch_posts', posts);
  renderPosts(type, posts);
}

function renderPosts(type, posts) {
  if (type === 'notes') notePosts = posts; else watchPosts = posts;
  var cId = type === 'notes' ? 'notes-posts' : 'watch-posts';
  var lId = type === 'notes' ? 'notes-label' : 'watch-label';
  var container = document.getElementById(cId);
  var label = document.getElementById(lId);
  if (!posts || posts.length === 0) { label.style.display='none'; container.innerHTML=''; return; }
  label.style.display = 'block';
  container.innerHTML = '';
  posts.forEach(function(p) {
    var div = document.createElement('div'); div.className = 'post';
    var meta = document.createElement('div'); meta.className = 'post-meta';
    var ds = document.createElement('span'); ds.className = 'post-date'; ds.textContent = p.date;
    var db = document.createElement('button'); db.className = 'post-del'; db.textContent = 'Delete';
    db.onclick = function() { deletePost(type, p.id); };
    meta.appendChild(ds); meta.appendChild(db);
    var body = document.createElement('div'); body.className = 'post-body'; body.textContent = p.body;
    div.appendChild(meta); div.appendChild(body);
    container.appendChild(div);
  });
}

async function init() {
  document.getElementById('notes-date').textContent = todayStr();
  document.getElementById('watch-date').textContent = todayStr();

  var savedPos = await cloudGet('positions');
  pos = savedPos || JSON.parse(JSON.stringify(DEFAULTS));
  render();

  var lastUpdated = await cloudGet('last_updated');
  setLastUpdated(lastUpdated);

  var savedNotes = await cloudGet('notes_posts');
  if (savedNotes) renderPosts('notes', savedNotes);
  var savedWatch = await cloudGet('watch_posts');
  if (savedWatch) renderPosts('watchlist', savedWatch);
}

init();
</script>
