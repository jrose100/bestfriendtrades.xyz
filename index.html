<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Best Friend Trades</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ── Reset ── */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

/* ── Design tokens — Tiger Oakes dark palette ── */
:root {
  --bg:         #0d1117;
  --bg-card:    #13191f;
  --bg-hover:   #1a2130;
  --accent:     #e85d04;
  --accent-dim: rgba(232, 93, 4, 0.12);
  --text:       #e8edf5;
  --text-2:     #7d8fa6;
  --text-3:     #455468;
  --border:     #1e2a38;
  --border-2:   #263040;
  --sans:       "Inter", system-ui, -apple-system, sans-serif;
  --mono:       "JetBrains Mono", ui-monospace, monospace;
}

/* ── Base ── */
html { -webkit-font-smoothing: antialiased; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 16px;
  line-height: 1.6;
  min-height: 100svh;
}
::selection { background: var(--accent); color: #fff; }
a { color: inherit; text-decoration: none; }

/* ── Skip nav ── */
.skip { position: absolute; top: -100%; left: 16px; background: var(--accent);
  color: #fff; padding: 8px 14px; font-weight: 700; border-radius: 4px;
  text-decoration: none; z-index: 9999; }
.skip:focus { top: 12px; }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; border-radius: 3px; }
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .01ms !important; } }

/* ── Header ── */
header {
  padding: 48px 64px 44px;
  border-bottom: 1px solid var(--border);
}
.site-name {
  font-size: clamp(40px, 7vw, 72px);
  font-weight: 900;
  letter-spacing: -3px;
  line-height: 0.95;
  color: var(--text);
  display: block;
  transition: color 0.15s;
}
.site-name:hover { color: var(--accent); }
.site-name em {
  font-style: normal;
  color: var(--accent);
}
.site-tagline {
  margin-top: 14px;
  font-family: var(--mono);
  font-size: 12px;
  letter-spacing: 0.5px;
  color: var(--text-3);
}

/* ── Outer wrapper ── */
.page-wrap {
  max-width: 680px;
  margin: 0 auto;
  padding: 0 64px;
}

/* ── Archive ── */
.archive {
  padding-top: 64px;
  padding-bottom: 128px;
}

/* ── Month header ── */
.month-group { margin-bottom: 0; }
.month-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--text-3);
  padding: 40px 0 16px;
  border-bottom: 1px solid var(--border);
  display: block;
}
.month-group:first-child .month-label { padding-top: 0; }

/* ── Day entry (blog post row) ── */
.day-entry {
  border-bottom: 1px solid var(--border);
  padding: 32px 0 28px;
  animation: rise 0.3s ease both;
}
@keyframes rise {
  from { opacity: 0; transform: translateY(5px); }
  to   { opacity: 1; transform: translateY(0); }
}

.entry-meta {
  display: flex;
  align-items: center;
  gap: 10px;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
  margin-bottom: 10px;
}
.meta-dot {
  width: 5px;
  height: 5px;
  border-radius: 50%;
  background: var(--accent);
  flex-shrink: 0;
}

/* Ticker chips grid */
.tickers {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 12px;
}
.chip {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  background: var(--bg-card);
  border: 1px solid var(--border-2);
  padding: 6px 12px;
  border-radius: 5px;
  display: inline-flex;
  align-items: center;
  gap: 7px;
  transition: border-color 0.12s, background 0.12s, color 0.12s;
}
.chip:hover {
  border-color: var(--accent);
  background: var(--accent-dim);
  color: #fff;
}
.chip-price { color: var(--text-3); font-size: 11px; }
.chip-pct   { font-size: 11px; }
.chip-up    { color: var(--accent); }
.chip-dn    { color: var(--text-3); }
.chip-empty { color: var(--text-3); border-style: dashed; }

.entry-summary {
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
}

/* ── Skeleton loading ── */
.skel-group { margin-bottom: 0; }
.skel-month { height: 11px; width: 120px; background: var(--bg-card); border-radius: 3px;
  margin: 0 0 16px; animation: pulse 1.4s ease infinite; }
.skel-entry { border-bottom: 1px solid var(--border); padding: 32px 0 28px; }
.skel-bar   { height: 12px; background: var(--bg-card); border-radius: 3px;
  animation: pulse 1.4s ease infinite; }
.skel-chips { display: flex; gap: 6px; margin-top: 16px; }
.skel-chip  { height: 34px; background: var(--bg-card); border-radius: 5px;
  animation: pulse 1.4s ease infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.25; } }

/* ── Empty state ── */
.empty-state {
  padding: 80px 0;
  text-align: center;
  border-top: 1px solid var(--border);
}
.empty-title { font-size: 20px; font-weight: 700; color: var(--text-3); margin-bottom: 10px; }
.empty-sub { font-family: var(--mono); font-size: 13px; color: var(--text-3); line-height: 2; }
.empty-sub code {
  background: var(--bg-card); border: 1px solid var(--border-2);
  padding: 2px 8px; border-radius: 3px; color: var(--text-2);
}

/* ── Footer ── */
footer {
  border-top: 1px solid var(--border);
  padding: 20px 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--text-3);
}

/* ── Responsive ── */
@media (max-width: 640px) {
  header, footer  { padding: 32px 20px 28px; }
  .page-wrap      { padding: 0 20px; }
  .site-name      { font-size: 40px; letter-spacing: -2px; }
  .chip-price,
  .chip-pct       { display: none; }
}
</style>
</head>
<body>

<a href="#main" class="skip">Skip to content</a>

<header>
  <a href="/" class="site-name" aria-label="Best Friend Trades — home">
    Best&nbsp;Friend&nbsp;<em>Trades</em>
  </a>
  <p class="site-tagline">Stage 2 watchlist — every morning before the open</p>
</header>

<div class="page-wrap">
  <main id="main" class="archive" aria-label="Daily watchlist archive">

    <!-- Skeleton shown while loading -->
    <div id="feed">
      <div class="skel-group">
        <div class="skel-month" style="animation-delay:0ms"></div>
        <div class="skel-entry">
          <div class="skel-bar" style="width:140px;animation-delay:30ms"></div>
          <div class="skel-chips">
            <div class="skel-chip" style="width:70px;animation-delay:60ms"></div>
            <div class="skel-chip" style="width:80px;animation-delay:90ms"></div>
            <div class="skel-chip" style="width:66px;animation-delay:120ms"></div>
            <div class="skel-chip" style="width:74px;animation-delay:150ms"></div>
            <div class="skel-chip" style="width:60px;animation-delay:180ms"></div>
          </div>
        </div>
        <div class="skel-entry">
          <div class="skel-bar" style="width:120px;animation-delay:60ms"></div>
          <div class="skel-chips">
            <div class="skel-chip" style="width:76px;animation-delay:90ms"></div>
            <div class="skel-chip" style="width:64px;animation-delay:120ms"></div>
            <div class="skel-chip" style="width:80px;animation-delay:150ms"></div>
            <div class="skel-chip" style="width:70px;animation-delay:180ms"></div>
          </div>
        </div>
        <div class="skel-entry">
          <div class="skel-bar" style="width:130px;animation-delay:90ms"></div>
          <div class="skel-chips">
            <div class="skel-chip" style="width:72px;animation-delay:120ms"></div>
            <div class="skel-chip" style="width:66px;animation-delay:150ms"></div>
            <div class="skel-chip" style="width:78px;animation-delay:180ms"></div>
          </div>
        </div>
      </div>
    </div>

  </main>
</div>

<footer>
  <span>bestfriendtrades.xyz</span>
  <span id="footerTime"></span>
</footer>

<script>
"use strict";

/* ── Formatters ── */
function fmtDateFull(iso) {
  return new Date(iso).toLocaleDateString("en-US", {
    weekday: "long", month: "long", day: "numeric", year: "numeric"
  });
}
function fmtDateShort(iso) {
  return new Date(iso).toLocaleDateString("en-US", {
    weekday: "short", month: "short", day: "numeric"
  });
}
function fmtMonth(iso) {
  return new Date(iso).toLocaleDateString("en-US", { month: "long", year: "numeric" });
}
function monthKey(iso) { return iso ? iso.slice(0, 7) : "unknown"; }

/* ── Build one day's entry HTML ── */
function buildEntry(day, delay) {
  const results = day.results || [];
  const iso     = day.scanned_at || day.date || new Date().toISOString();

  const chipsHtml = results.length
    ? results.map(s => {
        const pct   = parseFloat(s.pctDiff ?? 0);
        const sign  = pct >= 0 ? "+" : "";
        const pcls  = pct >= 0 ? "chip-up" : "chip-dn";
        const price = parseFloat(s.price ?? 0);
        return `<span class="chip" title="${s.ticker}">
          ${s.ticker}${
          price > 0 ? ` <span class="chip-price">$${price.toFixed(2)}</span>` : ""}${
          !isNaN(pct) ? ` <span class="chip-pct ${pcls}">${sign}${pct.toFixed(1)}%</span>` : ""}
        </span>`;
      }).join("")
    : `<span class="chip chip-empty">No setups</span>`;

  const summary = day.total_scanned
    ? `${results.length} setup${results.length !== 1 ? "s" : ""} · ${day.total_scanned} tickers scanned`
    : `${results.length} setup${results.length !== 1 ? "s" : ""}`;

  return `
    <article class="day-entry" style="animation-delay:${delay}ms" aria-label="Watchlist for ${fmtDateFull(iso)}">
      <div class="entry-meta">
        <span class="meta-dot" aria-hidden="true"></span>
        <time datetime="${iso}">${fmtDateFull(iso)}</time>
      </div>
      <div class="tickers" role="list" aria-label="Tickers">${chipsHtml}</div>
      <p class="entry-summary">${summary}</p>
    </article>`;
}

/* ── Group days by month and render ── */
function renderArchive(days) {
  if (!days.length) {
    document.getElementById("feed").innerHTML = `
      <div class="empty-state">
        <p class="empty-title">No scans yet</p>
        <p class="empty-sub">
          Run the nightly workflow to populate results.<br>
          <code>Actions → Nightly Stage 2 Scan → Run workflow</code>
        </p>
      </div>`;
    return;
  }

  // Sort newest first
  days.sort((a, b) =>
    new Date(b.scanned_at || b.date || 0) - new Date(a.scanned_at || a.date || 0)
  );

  // Group by month
  const groups = new Map();
  days.forEach(d => {
    const k = monthKey(d.scanned_at || d.date || "");
    if (!groups.has(k)) groups.set(k, []);
    groups.get(k).push(d);
  });

  let globalIdx = 0;
  let html = "";
  groups.forEach((dayList, key) => {
    const label = fmtMonth(dayList[0].scanned_at || dayList[0].date);
    const entries = dayList.map(d => buildEntry(d, globalIdx++ * 40)).join("");
    html += `<div class="month-group">
      <span class="month-label">${label}</span>
      ${entries}
    </div>`;
  });

  document.getElementById("feed").innerHTML = html;

  if (days[0].scanned_at) {
    document.getElementById("footerTime").textContent =
      "Last scan " + new Date(days[0].scanned_at).toLocaleString([], {
        month: "short", day: "numeric",
        hour: "2-digit", minute: "2-digit"
      });
  }
}

/* ── Fetch & handle both single-day and multi-day JSON ── */
async function load() {
  try {
    const r = await fetch("./results.json?t=" + Date.now());
    if (!r.ok) throw new Error("missing");
    const data = await r.json();

    if (Array.isArray(data))      renderArchive(data);        // [ {date, results}, … ]
    else if (Array.isArray(data.days)) renderArchive(data.days); // { days: [ … ] }
    else                          renderArchive([data]);       // single day legacy
  } catch {
    document.getElementById("feed").innerHTML = `
      <div class="empty-state">
        <p class="empty-title">No scan yet</p>
        <p class="empty-sub">
          Run the nightly workflow to generate today's results.<br>
          <code>Actions → Nightly Stage 2 Scan → Run workflow</code>
        </p>
      </div>`;
  }
}

load();
</script>
</body>
</html>
